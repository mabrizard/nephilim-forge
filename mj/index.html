<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nephilim — Interface MJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#7a6030;
  --ink:#0d0b08;--parch:#f0e6c8;--parch-d:#d4c49a;
  --blood:#8b1a1a;--blood-l:#c0504a;
  --air:#7eb8d4;--fire:#e05c2a;--earth:#6b8e4e;--water:#3a6b8a;--moon:#9b8fc0;
  --seph:#c0a0ff;--ok:#6b8e6b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0b08;color:var(--parch);font-family:'EB Garamond',serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(201,168,76,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(139,26,26,.08) 0%,transparent 50%);pointer-events:none;z-index:0}

/* ── LOGIN ─────────────────────────────────────────── */
.login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;background:#0d0b08}
.login-box{background:#1a150e;border:1px solid var(--gold-d);border-radius:14px;padding:2.5rem 2rem;max-width:380px;width:100%;text-align:center}
.login-sigil{font-size:2.5rem;display:inline-block;animation:spin 20s linear infinite;opacity:.7;margin-bottom:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.login-title{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.3rem;margin-bottom:.2rem}
.login-sub{color:var(--parch-d);font-style:italic;font-size:.85rem;margin-bottom:1.5rem}
.login-input{width:100%;background:rgba(13,11,8,.85);border:1px solid var(--gold-d);color:var(--parch);padding:.65rem .9rem;border-radius:6px;font-family:'EB Garamond',serif;font-size:.95rem;text-align:center;margin-bottom:.8rem;transition:border-color .2s}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;font-family:'Cinzel',serif;font-size:.85rem;padding:.75rem;border-radius:6px;cursor:pointer;border:1px solid var(--gold);background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--ink);font-weight:700;transition:all .2s;margin-bottom:.5rem}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.45;cursor:not-allowed}
.login-msg{font-size:.82rem;min-height:1.2em;font-style:italic;color:var(--blood-l)}
.login-msg.ok{color:var(--ok)}
.login-setup{margin-top:1.2rem;padding-top:1rem;border-top:1px solid rgba(201,168,76,.15)}
.login-setup p{font-size:.75rem;color:var(--parch-d);margin-bottom:.5rem}
.login-setup input{font-size:.8rem;padding:.4rem .7rem;margin-bottom:.3rem}
.login-setup .save-btn{width:auto;padding:.4rem 1rem;font-size:.75rem;background:rgba(201,168,76,.1);border:1px solid var(--gold-d);color:var(--gold);border-radius:5px;cursor:pointer;font-family:'Cinzel',serif}

/* ── APP ────────────────────────────────────────────── */
.app{display:none;position:relative;z-index:1;min-height:100vh}
.app.visible{display:block}

/* ── HEADER ─────────────────────────────────────────── */
.mj-header{background:rgba(13,11,8,.95);border-bottom:1px solid var(--gold-d);padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(4px)}
.mj-header-left{display:flex;align-items:center;gap:.8rem}
.mj-logo{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.1rem}
.mj-badge{font-family:'Cinzel',serif;font-size:.65rem;padding:.15rem .5rem;border-radius:10px;background:rgba(139,26,26,.2);border:1px solid var(--blood-l);color:var(--blood-l);letter-spacing:.05em}
.mj-header-right{display:flex;align-items:center;gap:.7rem}
.mj-user{font-size:.78rem;color:var(--parch-d);font-style:italic}
.mj-live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse .8s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.mj-btn{font-family:'Cinzel',serif;font-size:.73rem;padding:.4rem .9rem;border-radius:5px;cursor:pointer;border:1px solid var(--gold-d);background:transparent;color:var(--parch-d);transition:all .15s}
.mj-btn:hover{border-color:var(--gold);color:var(--parch)}
.mj-btn.danger{border-color:rgba(139,26,26,.4);color:var(--blood-l)}
.mj-btn.danger:hover{background:rgba(139,26,26,.15)}

/* ── LAYOUT ─────────────────────────────────────────── */
.mj-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 53px)}
@media(max-width:768px){.mj-layout{grid-template-columns:1fr}.sidebar{display:none}}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar{border-right:1px solid var(--gold-d);background:rgba(13,11,8,.4);padding:1.2rem;overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px}
.sidebar-title{font-family:'Cinzel',serif;font-size:.72rem;color:var(--gold-d);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.9rem;padding-bottom:.4rem;border-bottom:1px solid rgba(201,168,76,.12)}
.player-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .8rem;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:.3rem;border:1px solid transparent}
.player-item:hover{background:rgba(201,168,76,.05);border-color:var(--gold-d)}
.player-item.active{background:rgba(201,168,76,.08);border-color:var(--gold)}
.player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1px solid rgba(201,168,76,.2)}
.player-info{flex:1;min-width:0}
.player-nom{font-family:'Cinzel',serif;font-size:.82rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub{font-size:.7rem;color:var(--parch-d);font-style:italic}
.player-step{font-size:.65rem;font-family:'Cinzel',serif;color:var(--gold-d);background:rgba(201,168,76,.08);padding:.1rem .35rem;border-radius:4px;flex-shrink:0}

/* ── MAIN PANEL ──────────────────────────────────────── */
.main-panel{padding:1.5rem;overflow-y:auto}
.panel-empty{text-align:center;padding:4rem 2rem;color:var(--parch-d)}
.panel-empty .empty-sigil{font-size:2.5rem;opacity:.3;display:block;margin-bottom:.8rem}
.panel-empty p{font-style:italic;font-size:.9rem}

/* ── FICHE MJ ────────────────────────────────────────── */
.fiche-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.fiche-nom{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.5rem;text-shadow:0 0 20px rgba(201,168,76,.3)}
.fiche-joueur{font-size:.82rem;color:var(--parch-d);font-style:italic;margin-top:.2rem}
.fiche-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
.fiche-badge{font-family:'Cinzel',serif;font-size:.68rem;padding:.2rem .6rem;border-radius:10px;border:1px solid var(--gold-d);color:var(--parch-d);background:rgba(201,168,76,.06)}
.fiche-badge.ka{border-color:rgba(201,168,76,.3);color:var(--gold)}
.fiche-actions{display:flex;gap:.5rem;flex-wrap:wrap}

/* ── PENTACLE ─────────────────────────────────────────── */
.section-title{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;margin:1.5rem 0 .8rem;padding-bottom:.3rem;border-bottom:1px solid rgba(201,168,76,.12)}
.pentacle-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.7rem;margin-bottom:1.5rem}
.ka-box{text-align:center;padding:.8rem .5rem;border-radius:8px;border:1px solid;transition:all .2s}
.ka-box.dom{border-color:var(--gold);background:rgba(201,168,76,.1);box-shadow:0 0 12px rgba(201,168,76,.15)}
.ka-box.sec{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.04)}
.ka-box.neu{border-color:rgba(201,168,76,.15);background:transparent}
.ka-box.opp{border-color:rgba(139,26,26,.3);background:rgba(139,26,26,.05)}
.ka-ico{font-size:1.4rem;display:block;margin-bottom:.2rem}
.ka-nm{font-family:'Cinzel',serif;font-size:.65rem;color:var(--parch-d);display:block}
.ka-val{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--gold);display:block;line-height:1.1}
.ka-role{font-size:.6rem;color:var(--gold-d);font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.05em}

/* ── ATTRIBUTS ───────────────────────────────────────── */
.attrs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.6rem;margin-bottom:1.5rem}
.attr-card{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:.7rem;text-align:center}
.attr-label{font-family:'Cinzel',serif;font-size:.6rem;color:var(--parch-d);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:.2rem}
.attr-val{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold)}
.attr-fm{font-size:.6rem;color:var(--gold-d);font-style:italic}

/* ── SCIENCES ────────────────────────────────────────── */
.sciences-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.5rem}
.sci-card{border:1px solid rgba(192,160,255,.2);border-radius:8px;padding:.9rem;background:rgba(192,160,255,.04)}
.sci-label{font-family:'Cinzel',serif;font-size:.72rem;color:var(--seph);margin-bottom:.5rem;display:block}
.sci-bar-wrap{background:rgba(192,160,255,.1);border-radius:3px;height:5px;margin-bottom:.3rem;overflow:hidden}
.sci-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--seph),rgba(192,160,255,.5));transition:width .5s ease}
.sci-deg{font-family:'Cinzel',serif;font-size:.78rem;color:var(--parch-d)}

/* ── INCARNATIONS ────────────────────────────────────── */
.inc-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem}
.inc-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border:1px solid rgba(201,168,76,.15);border-radius:6px;background:rgba(13,11,8,.4)}
.inc-ico{font-size:1.1rem;flex-shrink:0}
.inc-info{flex:1;min-width:0}
.inc-nm{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold)}
.inc-det{font-size:.7rem;color:var(--parch-d);font-style:italic}
.inc-badges{display:flex;gap:.3rem;flex-shrink:0;flex-wrap:wrap}
.inc-badge{font-size:.62rem;padding:.1rem .4rem;border-radius:6px;font-family:'Cinzel',serif;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold-d)}

/* ── CHUTES ──────────────────────────────────────────── */
.chutes-row{display:flex;gap:.7rem;margin-bottom:1.5rem;flex-wrap:wrap}
.chute-card{flex:1;min-width:100px;padding:.7rem;border-radius:8px;text-align:center}
.chute-card.khaiba{border:1px solid rgba(139,26,26,.4);background:rgba(139,26,26,.08)}
.chute-card.narcose{border:1px solid rgba(155,143,192,.3);background:rgba(155,143,192,.06)}
.chute-card.ombre{border:1px solid rgba(50,50,80,.5);background:rgba(20,20,40,.3)}
.chute-label{font-family:'Cinzel',serif;font-size:.65rem;color:var(--parch-d);display:block;margin-bottom:.3rem}
.chute-val{font-family:'Cinzel Decorative',serif;font-size:1.4rem}
.chute-card.khaiba .chute-val{color:var(--blood-l)}
.chute-card.narcose .chute-val{color:var(--seph)}
.chute-card.ombre .chute-val{color:#8888bb}

/* ── HISTORIQUE VERSIONS ─────────────────────────────── */
.versions-list{display:flex;flex-direction:column;gap:.4rem}
.version-row{display:flex;align-items:center;gap:.8rem;padding:.6rem .9rem;border:1px solid rgba(201,168,76,.12);border-radius:6px;background:rgba(13,11,8,.4);cursor:pointer;transition:all .15s}
.version-row:hover{border-color:var(--gold-d);background:rgba(201,168,76,.04)}
.version-label{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);flex:1}
.version-date{font-size:.72rem;color:var(--parch-d);font-style:italic}
.version-pi{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold-d)}
.version-restore{font-family:'Cinzel',serif;font-size:.68rem;padding:.25rem .7rem;border:1px solid rgba(201,168,76,.25);border-radius:4px;background:transparent;color:var(--parch-d);cursor:pointer;transition:all .15s}
.version-restore:hover{border-color:var(--gold);color:var(--gold)}

/* ── PI BARRE ────────────────────────────────────────── */
.pi-summary{display:flex;align-items:center;gap:1rem;padding:.8rem 1rem;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2);border-radius:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.pi-item{text-align:center}
.pi-item-label{font-size:.65rem;color:var(--parch-d);font-family:'Cinzel',serif;letter-spacing:.06em;text-transform:uppercase;display:block}
.pi-item-val{font-family:'Cinzel Decorative',serif;font-size:1.2rem;color:var(--gold)}
.pi-bar-wrap{flex:1;min-width:120px}
.pi-bar-track{background:rgba(201,168,76,.1);border-radius:3px;height:6px;overflow:hidden}
.pi-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .5s ease}

/* ── ARCANE ──────────────────────────────────────────── */
.arcane-card{padding:.8rem 1rem;border:1px solid rgba(192,160,255,.3);border-radius:8px;background:rgba(192,160,255,.05);margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem}
.arcane-num{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--seph);flex-shrink:0}
.arcane-info{}
.arcane-nm{font-family:'Cinzel',serif;font-size:.88rem;color:var(--seph)}
.arcane-sub{font-size:.72rem;color:var(--parch-d);font-style:italic;margin-top:.1rem}

/* ── REALTIME ────────────────────────────────────────── */
.realtime-banner{font-family:'Cinzel',serif;font-size:.7rem;padding:.3rem .8rem;background:rgba(107,142,107,.1);border-bottom:1px solid rgba(107,142,107,.2);color:var(--ok);display:flex;align-items:center;gap:.5rem;justify-content:center}

/* ── LOADING ─────────────────────────────────────────── */
.loading{text-align:center;padding:3rem;color:var(--parch-d)}
.loading-spin{font-size:2rem;display:inline-block;animation:spin 1.5s linear infinite;margin-bottom:.5rem}

/* ── TOAST ───────────────────────────────────────────── */
.toast-mj{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(13,11,8,.97);border:1px solid var(--gold);color:var(--gold);padding:.6rem 1.4rem;border-radius:7px;font-family:'Cinzel',serif;font-size:.78rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;z-index:200;opacity:0;pointer-events:none}
.toast-mj.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-mj.ok{border-color:var(--ok);color:var(--ok)}

/* ── MODAL ───────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#1a150e;border:1px solid var(--gold-d);border-radius:12px;padding:1.8rem;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.modal h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.05rem;margin-bottom:1.2rem}
.modal-close{background:transparent;border:1px solid var(--gold-d);color:var(--parch-d);padding:.4rem 1rem;border-radius:5px;cursor:pointer;font-family:'Cinzel',serif;font-size:.75rem;margin-top:1rem}
.modal-close:hover{border-color:var(--gold);color:var(--parch)}
</style>
</head>
<body>

<!-- ═══ PAGE LOGIN ═══════════════════════════════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-sigil">✡</div>
    <h1 class="login-title">Interface MJ</h1>
    <p class="login-sub">Accès réservé au Maître de Jeu</p>

    <input class="login-input" type="password" id="mj-password" placeholder="Mot de passe MJ" autocomplete="current-password"/>
    <button class="login-btn" id="mj-login-btn">Entrer dans la Forge</button>
    <div class="login-msg" id="mj-login-msg"></div>

    <div class="login-setup" id="login-setup">
      <p>Première connexion — configurez Supabase :</p>
      <input class="login-input" type="text" id="setup-url" placeholder="https://xxxx.supabase.co" style="font-size:.8rem;padding:.4rem .7rem;margin-bottom:.3rem"/>
      <input class="login-input" type="text" id="setup-key" placeholder="Clé anon public (eyJ…)" style="font-size:.8rem;padding:.4rem .7rem;margin-bottom:.5rem"/>
      <button class="save-btn" onclick="saveSupabaseConfig()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ═══ APPLICATION ═══════════════════════════════════ -->
<div class="app" id="app">

  <div class="realtime-banner" id="realtime-banner" style="display:none">
    <div class="mj-live-dot"></div>
    Connexion temps réel active — les fiches se mettent à jour automatiquement
  </div>

  <header class="mj-header">
    <div class="mj-header-left">
      <span class="mj-logo">✡ Nephilim</span>
      <span class="mj-badge">Interface MJ</span>
    </div>
    <div class="mj-header-right">
      <span class="mj-user" id="header-info"></span>
      <button class="mj-btn" onclick="refreshAll()">↻ Actualiser</button>
      <a href="/" style="text-decoration:none"><button class="mj-btn">← Retour appli</button></a>
      <button class="mj-btn danger" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="mj-layout">
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-title">Joueurs connectés</div>
      <div id="players-list"><div class="loading"><div class="loading-spin">⟳</div><br>Chargement…</div></div>
    </aside>

    <!-- ── PANNEAU PRINCIPAL ── -->
    <main class="main-panel" id="main-panel">
      <div class="panel-empty" id="panel-empty">
        <span class="empty-sigil">✡</span>
        <p>Sélectionnez un joueur dans la liste<br>pour consulter sa fiche.</p>
      </div>
      <div id="fiche-container" style="display:none"></div>
    </main>
  </div>
</div>

<div class="toast-mj" id="toast-mj"></div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG & STATE
// ════════════════════════════════════════════════════════
const MJ_PASSWORD_KEY = 'neph_mj_pw';
const MJ_AUTH_KEY     = 'neph_mj_auth';

let supaClient   = null;
let allPersonnages = [];
let currentPersonnageId = null;
let realtimeChannel = null;

const KA_DATA = {
  Air:  {ico:'🜁', color:'#7eb8d4'},
  Feu:  {ico:'🜂', color:'#e05c2a'},
  Terre:{ico:'🜃', color:'#6b8e4e'},
  Eau:  {ico:'🜄', color:'#3a6b8a'},
  Lune: {ico:'☽',  color:'#9b8fc0'},
};
const KA_SCORES_FROM_DOM = (dom) => {
  if(!dom) return {Air:0,Feu:0,Terre:0,Eau:0,Lune:0};
  const map = {Air:{opp:['Terre','Lune'],neu:['Feu','Eau']},Feu:{opp:['Eau','Lune'],neu:['Air','Terre']},Terre:{opp:['Air','Lune'],neu:['Feu','Eau']},Eau:{opp:['Feu','Lune'],neu:['Air','Terre']},Lune:{opp:['Terre','Eau'],neu:['Air','Feu']}};
  const d = map[dom];
  const sc = {Air:0,Feu:0,Terre:0,Eau:0,Lune:0};
  sc[dom] = 5;
  (d.neu||[]).forEach(k=>sc[k]=4);
  (d.opp||[]).forEach(k=>sc[k]=3);
  return sc;
};
const STEP_NAMES = ['','Ka','Pentacle','Profil','Passé','Occultes','Stase','Simulacre','Attributs','Final'];

// ════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ════════════════════════════════════════════════════════
function getSupaConfig(){
  return {
    url: localStorage.getItem('neph_supa_url')||'',
    key: localStorage.getItem('neph_supa_key')||'',
  };
}
function saveSupabaseConfig(){
  const url = document.getElementById('setup-url').value.trim();
  const key = document.getElementById('setup-key').value.trim();
  if(!url.startsWith('https://')||key.length<20){toast('URL ou clé invalide','err');return;}
  localStorage.setItem('neph_supa_url', url);
  localStorage.setItem('neph_supa_key', key);
  toast('Configuration enregistrée — rechargez', 'ok');
  setTimeout(()=>location.reload(), 1200);
}

function initSupabase(){
  const {url,key} = getSupaConfig();
  if(!url||!key) return false;
  try{
    supaClient = window.supabase.createClient(url, key);
    return true;
  }catch(e){return false;}
}

// ════════════════════════════════════════════════════════
// AUTHENTIFICATION MJ (mot de passe local)
// ════════════════════════════════════════════════════════
function checkLogin(){
  const cfg = getSupaConfig();

  // Masquer setup si déjà configuré
  if(cfg.url && cfg.key){
    document.getElementById('login-setup').style.display = 'none';
  }

  // Vérifier session active
  const session = sessionStorage.getItem(MJ_AUTH_KEY);
  if(session === 'ok'){
    showApp();
    return;
  }
  document.getElementById('login-screen').style.display = 'flex';
}

document.getElementById('mj-login-btn').onclick = () => {
  const pw = document.getElementById('mj-password').value;
  const stored = localStorage.getItem(MJ_PASSWORD_KEY);
  const msg = document.getElementById('mj-login-msg');

  if(!stored){
    // Premier lancement — définir le mot de passe
    if(pw.length < 4){msg.textContent='Minimum 4 caractères';return;}
    localStorage.setItem(MJ_PASSWORD_KEY, btoa(pw));
    sessionStorage.setItem(MJ_AUTH_KEY, 'ok');
    showApp();
    return;
  }

  if(btoa(pw) === stored){
    sessionStorage.setItem(MJ_AUTH_KEY, 'ok');
    showApp();
  } else {
    msg.textContent = 'Mot de passe incorrect';
    document.getElementById('mj-password').value = '';
    document.getElementById('mj-password').focus();
  }
};

document.getElementById('mj-password').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('mj-login-btn').click();
});

// Premier lancement : adapter le label
window.addEventListener('load', ()=>{
  const stored = localStorage.getItem(MJ_PASSWORD_KEY);
  if(!stored){
    document.getElementById('mj-login-btn').textContent = 'Définir le mot de passe';
    const msg = document.getElementById('mj-login-msg');
    msg.className = 'login-msg ok';
    msg.textContent = 'Première connexion — choisissez un mot de passe MJ';
  }
  checkLogin();
});

function logout(){
  sessionStorage.removeItem(MJ_AUTH_KEY);
  location.reload();
}

// ════════════════════════════════════════════════════════
// INITIALISATION APP
// ════════════════════════════════════════════════════════
async function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  if(!initSupabase()){
    document.getElementById('players-list').innerHTML =
      '<p style="color:var(--blood-l);font-size:.8rem;padding:.5rem">⚠ Supabase non configuré.<br>Reconnectez-vous et renseignez l\'URL + clé.</p>';
    return;
  }

  await loadAllPersonnages();
  setupRealtime();
}

// ════════════════════════════════════════════════════════
// CHARGEMENT DES FICHES
// ════════════════════════════════════════════════════════
async function loadAllPersonnages(){
  try{
    const {data, error} = await supaClient
      .from('personnages')
      .select(`
        id, nom, ka_dom, metamorphe, profil, pi_total, updated_at, campaign_id,
        user_id, data_json
      `)
      .eq('is_active', true)
      .order('updated_at', {ascending:false});

    if(error) throw error;
    allPersonnages = data || [];
    renderSidebar();
    document.getElementById('header-info').textContent =
      `${allPersonnages.length} personnage${allPersonnages.length>1?'s':''} actif${allPersonnages.length>1?'s':''}`;
  }catch(e){
    document.getElementById('players-list').innerHTML =
      `<p style="color:var(--blood-l);font-size:.8rem;padding:.5rem">Erreur : ${e.message}</p>`;
  }
}

// ════════════════════════════════════════════════════════
// REALTIME — mise à jour automatique
// ════════════════════════════════════════════════════════
function setupRealtime(){
  if(!supaClient) return;
  realtimeChannel = supaClient
    .channel('personnages-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'personnages'}, async (payload)=>{
      await loadAllPersonnages();
      // Si la fiche affichée est modifiée, la rafraîchir
      if(currentPersonnageId){
        const updated = allPersonnages.find(p=>p.id===currentPersonnageId);
        if(updated) renderFiche(updated, false);
      }
      toast('Fiche mise à jour en temps réel', 'ok');
    })
    .subscribe();

  document.getElementById('realtime-banner').style.display = 'flex';
}

async function refreshAll(){
  await loadAllPersonnages();
  if(currentPersonnageId){
    const p = allPersonnages.find(x=>x.id===currentPersonnageId);
    if(p) renderFiche(p, false);
  }
  toast('Actualisé', 'ok');
}

// ════════════════════════════════════════════════════════
// SIDEBAR — liste des joueurs
// ════════════════════════════════════════════════════════
function renderSidebar(){
  const list = document.getElementById('players-list');
  if(allPersonnages.length === 0){
    list.innerHTML = '<p style="color:var(--parch-d);font-size:.8rem;font-style:italic;padding:.5rem">Aucun personnage trouvé.</p>';
    return;
  }
  list.innerHTML = '';
  allPersonnages.forEach(p => {
    const S = p.data_json || {};
    const ka = p.ka_dom;
    const kaInfo = KA_DATA[ka];
    const step = S.step||1;
    const div = document.createElement('div');
    div.className = 'player-item' + (p.id===currentPersonnageId?' active':'');
    div.onclick = () => {
      currentPersonnageId = p.id;
      renderFiche(p, true);
      document.querySelectorAll('.player-item').forEach(el=>el.classList.remove('active'));
      div.classList.add('active');
    };
    div.innerHTML = `
      <div class="player-avatar" style="background:${kaInfo?kaInfo.color+'22':'rgba(201,168,76,.1)'};border-color:${kaInfo?kaInfo.color+'55':'var(--gold-d)'}">
        ${kaInfo?kaInfo.ico:'✡'}
      </div>
      <div class="player-info">
        <div class="player-nom">${p.nom||'Sans nom'}</div>
        <div class="player-sub">${p.ka_dom||'?'} · ${p.metamorphe||'?'} · ${p.profil||'?'}</div>
      </div>
      <span class="player-step" title="Étape de création">${step<9?'Ét.'+step:'✓'}</span>`;
    list.appendChild(div);
  });
}

function sciCard(label, val, max, detail){
  const pct = Math.min(100, Math.round(val/Math.max(1,max)*100));
  return `<div class="sci-card">
    <span class="sci-label">${label}</span>
    <div class="sci-bar-wrap"><div class="sci-bar" style="width:${pct}%"></div></div>
    <span class="sci-deg">${val}° · ${detail}</span>
  </div>`;
}

function renderPentacle(pid, sc, dom){
  const wrap = document.getElementById(`pentacle-${pid}`);
  if(!wrap) return;
  const domObj = {Air:{opp:['Terre','Lune'],neu:['Feu','Eau']},Feu:{opp:['Eau','Lune'],neu:['Air','Terre']},Terre:{opp:['Air','Lune'],neu:['Feu','Eau']},Eau:{opp:['Feu','Lune'],neu:['Air','Terre']},Lune:{opp:['Terre','Eau'],neu:['Air','Feu']}};
  const roles = {};
  if(dom){
    roles[dom]='dom';
    const d = domObj[dom]||{};
    (d.neu||[]).forEach(k=>roles[k]='sec');
    (d.opp||[]).forEach(k=>roles[k]='opp');

  Object.entries(KA_DATA).forEach(([ka,info])=>{
    const role = roles[ka]||'neu';
    const val = sc[ka]||0;

// ════════════════════════════════════════════════════════
// CALCULS (miroir de l'application principale)
// ════════════════════════════════════════════════════════
function kaScoresFrom(S){
  const dom = S.ka_dom;
  if(!dom) return {Air:0,Feu:0,Terre:0,Eau:0,Lune:0};
  // Miroir exact de kaScores() dans l'application principale
  // Dom=5, Neutres=4, Opp selon profil (Éveillé:3/2, Révélé:2/1, Immortel:1/0)
  const KA_APP = {
    Air:  {neu:['Feu','Eau'],   opp:['Terre','Lune']},
    Feu:  {neu:['Air','Terre'], opp:['Eau','Lune']},
    Terre:{neu:['Feu','Eau'],   opp:['Air','Lune']},
    Eau:  {neu:['Air','Terre'], opp:['Feu','Lune']},
    Lune: {neu:['Air','Feu'],   opp:['Terre','Eau']},
  };
  const d = KA_APP[dom];
  const domVal = 5;
  const neuVal = 4;
  let opp1 = 3, opp2 = 2;
  if(S.profil === 'Révélé')  { opp1 = 2; opp2 = 1; }
  if(S.profil === 'Immortel'){ opp1 = 1; opp2 = 0; }
  const sc = {Air:neuVal,Feu:neuVal,Terre:neuVal,Eau:neuVal,Lune:neuVal};
  sc[dom] = domVal;
  if(d.opp[0]) sc[d.opp[0]] = opp1;
  if(d.opp[1]) sc[d.opp[1]] = opp2;
  return sc;
}

function calcAttrsFrom(sc){
  const feu = sc.Feu||0;
  let bonus_dom = 0;
  if(feu>=10) bonus_dom=2; else if(feu>=5) bonus_dom=1;
  return {
    perspicacite: 11-(sc.Air||0),
    recuperation: 11-(sc.Terre||0),
    initiative:   (sc.Eau||0)*2,
    voile:        0,
    bonus_dom,
  };
}

function calcPiSpent(S){
  let t = 0;
  for(const [id, inc] of Object.entries(S.incarnations||{})){
    // Coût époque : approximatif (pas accès à EPOQUES ici)
    if(id==='atlantide') t+=0; else if(['grand_eveil','apocalypse'].includes(id)) t+=2; else t+=1;
    if(inc.vecus_deg) t+=Object.values(inc.vecus_deg).reduce((a,b)=>a+b,0);
    if(inc.savoirs_extra) t+=Object.values(inc.savoirs_extra).reduce((a,b)=>a+b,0);
    if(inc.sciences_extra) t+=Object.values(inc.sciences_extra).reduce((a,b)=>a+b,0);
  }
  const totalMagie = (S.magie?.bas||0)+(S.magie?.haut||0)+(S.magie?.grand||0);
  t += Math.max(0, totalMagie-(S.pool_magie_used||0));
  const totalSeph = Object.values(S.sephiroth||{}).reduce((a,b)=>a+b,0);
  t += Math.ceil(Math.max(0, totalSeph-(S.pool_kabbale_used||0))/3);
  const totalAlch = (S.alchimie?.noir||0)+(S.alchimie?.blanc||0)+(S.alchimie?.rouge||0);
  t += Math.max(0, totalAlch-(S.pool_alchimie_used||0));
  t += Object.values(S.constructs||{}).reduce((a,b)=>a+b,0);
  return t;
}

function getArcaneAdopteFrom(S){
  // Chercher l'arcane adopté ET cumuler tous les degrés acquis
  // (adoption initiale + progressions dans d'autres époques)
  let arcaneId = null;
  let totalDeg = 0;
  for(const inc of Object.values(S.incarnations||{})){
    if(!inc) continue;
    if(inc.arcane_id){
      arcaneId = inc.arcane_id;
      totalDeg += (inc.arcane_deg||0);
    }
  }
  if(!arcaneId) return null;
  const a = ARCANES_MJ.find(x=>x.id===arcaneId);
  if(!a) return null;
  return {...a, deg:totalDeg};
}

function exportFicheTXT(pid){
  const p = allPersonnages.find(x=>x.id===pid);
  if(!p) return;
  const S = p.data_json||{};
  const sc = kaScoresFrom(S);
  const attrs = calcAttrsFrom(sc);
  const lines = [
    '═'.repeat(44),
    '  NEPHILIM — FICHE DE PERSONNAGE (Export MJ)',
    '═'.repeat(44),'',
    `Nom          : ${p.nom||'—'}`,
    `Ka Dominant  : ${p.ka_dom||'—'}`,
    `Métamorphe   : ${p.metamorphe||'—'}`,
    `Profil       : ${p.profil||'—'}`,
    `Objet-Stase  : ${S.stase||'—'}`,'',
    '── PENTACLE ───────────────────────────────',
    ...Object.entries(sc).map(([ka,v])=>`  Ka ${ka.padEnd(7)}: ${v}`),'',
    '── ATTRIBUTS ──────────────────────────────',
    `  Perspicacité : ${attrs.perspicacite}`,
    `  Récupération : ${attrs.recuperation}`,
    `  Initiative   : ${attrs.initiative}`,
    `  Bonus Dom.   : +${attrs.bonus_dom}`,'',
    '── SCIENCES OCCULTES ──────────────────────',
    `  Magie    : Basse ${S.magie?.bas||0} / Haute ${S.magie?.haut||0} / Grand ${S.magie?.grand||0}`,
    `  Kabbale  : ${Object.values(S.sephiroth||{}).reduce((a,b)=>a+b,0)}°`,
    `  Alchimie : Noir ${S.alchimie?.noir||0} / Blanc ${S.alchimie?.blanc||0} / Rouge ${S.alchimie?.rouge||0}`,'',
    '── CHUTES ─────────────────────────────────',
    `  Khaïba : ${S.chutes?.khaiba||0}°  Narcose : ${S.chutes?.narcose||0}°  Ombre : ${S.chutes?.ombre||0}°`,'',
    '── PI ─────────────────────────────────────',
    `  Budget : ${p.pi_total||0}  Dépensés : ${calcPiSpent(S)}  Restants : ${(p.pi_total||0)-calcPiSpent(S)}`,
    '═'.repeat(44),
  ];
  const blob = new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${p.nom||'nephilim'}_mj.txt`;
  a.click();
}

function showRawJSON(pid){
  const p = allPersonnages.find(x=>x.id===pid);
  if(!p) return;
  showJSONModal(p.data_json, `JSON — ${p.nom}`);
}

function showJSONModal(data, title){
  const old = document.querySelector('.modal-bg');if(old) old.remove();
  const bg = document.createElement('div');bg.className='modal-bg';
  bg.onclick = e=>{if(e.target===bg) bg.remove();};
  const modal = document.createElement('div');modal.className='modal';
  modal.innerHTML = `<h2>${title}</h2>
    <pre style="background:rgba(0,0,0,.4);padding:1rem;border-radius:6px;overflow-x:auto;font-size:.7rem;color:var(--parch-d);max-height:400px;overflow-y:auto">${JSON.stringify(data,null,2)}</pre>
    <button class="modal-close" onclick="this.closest('.modal-bg').remove()">Fermer</button>`;
  bg.appendChild(modal);
  document.body.appendChild(bg);
}

// TOAST
// ════════════════════════════════════════════════════════
let _toastTimer = null;
function toast(msg, type=''){
  const t = document.getElementById('toast-mj');
  t.className = 'toast-mj' + (type==='ok'?' ok':'');
  t.textContent = msg;
  void t.offsetWidth;
  t.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

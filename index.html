// ── Chargement Supabase ───────────────────────────────
async function loadGrimTab(tab){
  if(grimCache[tab]) return grimCache[tab];
  if(!supaClient) return [];
  const table=tab==='sorts'?'sorts':tab==='invocations'?'invocations':'formules';
  const {data,error}=await supaClient.from(table).select('*').order('cercle').order('nom');
  if(error||!data) return [];
  grimCache[tab]=data;
  return data;
}

// ── Logique d'accessibilité ───────────────────────────
function grimItemAccess(item, tab){
  const sc=grimGetKaScores();
  const magie=grimGetMagie();
  const seph=grimGetSephiroth();
  const alch=grimGetAlchimie();
  const dom=grimGetKaDom();

  if(tab==='sorts'){
    const cercle=item.cercle||'';
    const elem=item.element||'';
    // Basse Magie : faut au moins 1 degré Basse Magie
    if(cercle.includes('Basse')){
      const hasBasse=(magie.bas||0)>=1;
      if(!hasBasse) return {ok:false,reason:'Basse Magie requise'};
    }
    // Haute Magie : faut au moins 1 degré Haute Magie
    if(cercle.includes('Haute')){
      const hasHaut=(magie.haut||0)>=1;
      if(!hasHaut) return {ok:false,reason:'Haute Magie requise'};
      // Voie : si le sort a une voie, elle doit correspondre
      if(item.voie&&magie.voie&&!item.voie.includes(magie.voie)&&!magie.voie.includes(item.voie)){
        return {ok:'grise',reason:`Voie ${item.voie} requise`};
      }
    }
    // Grand Secret
    if(cercle.includes('Grand')){
      if(!(magie.grand>=1)) return {ok:false,reason:'Grand Secret requis'};
    }
    // Élément : le Ka de l'élément doit être > 0
    const elemBase=elem.replace('Au choix','').replace('Variable','').trim();
    if(elemBase&&elemBase!==''){
      const elems=elemBase.split(',').map(e=>e.trim()).filter(Boolean);
      const hasElem=elems.length===0||elems.some(e=>sc[e]&&sc[e]>0);
      if(!hasElem) return {ok:'grise',reason:`Ka ${elemBase} requis`};
    }
    return {ok:true};
  }

  if(tab==='invocations'){
    const cercle=item.cercle||'';
    const sephirah=(item.sephirah||'').toLowerCase();
    if(cercle.includes('Sceaux')){
      // Faut avoir au moins 1 degré dans la séphirah
      if(sephirah&&!(seph[sephirah]>=1)) return {ok:'grise',reason:`Séphirah ${item.sephirah} requise`};
    }
    if(cercle.includes('Pentacles')){
      if(sephirah&&!(seph[sephirah]>=1)) return {ok:false,reason:`Séphirah ${item.sephirah} requise`};
    }
    // Élément
    const elem=(item.element||'').split(',')[0].trim();
    if(elem&&elem!=='Choix'&&elem!=='Variable'&&elem!=='Celui du Kabbaliste'){
      if(!(sc[elem]>0)) return {ok:'grise',reason:`Ka ${elem} requis`};
    }
    return {ok:true};
  }

  if(tab==='formules'){
    const cercle=item.cercle||'';
    if(cercle.includes('Noir')&&!(alch.noir>=1)) return {ok:false,reason:"Oeuvre au Noir requise"};
    if(cercle.includes('Blanc')&&!(alch.blanc>=1)) return {ok:false,reason:"Oeuvre au Blanc requise"};
    if(cercle.includes('Rouge')&&!(alch.rouge>=1)) return {ok:false,reason:"Oeuvre au Rouge requise"};
    const elem=(item.element||'').trim();
    if(elem&&elem!=='Un élément'&&elem!==''){
      if(!(sc[elem]>0)) return {ok:'grise',reason:`Ka ${elem} requis`};
    }
    return {ok:true};
  }
  return {ok:true};
}

// ── Gestion sélection effets ──────────────────────────
function grimIsGrave(item){
  if(!item||!item.id) return false;
  return (grimGetEffets().gravés||[]).some(e=>e&&e.id===item.id&&e.tab===grimTab);
}
function grimIsFocus(item){
  if(!item||!item.id) return false;
  return (grimGetEffets().focus||[]).some(e=>e&&e.id===item.id&&e.tab===grimTab);
}
function grimAddEffet(item){
  if(!S.effets_magiques||typeof S.effets_magiques!=='object')S.effets_magiques={gravés:[],focus:[]};if(!S.effets_magiques.gravés)S.effets_magiques.gravés=[];if(!S.effets_magiques.focus)S.effets_magiques.focus=[];
  const gravés=S.effets_magiques.gravés||[];
  const focus=S.effets_magiques.focus||[];
  const max=grimMaxGraves();
  // Déjà présent ?
  if(grimIsGrave(item)||grimIsFocus(item)) return;
  const payload={id:item.id,tab:grimTab,nom:item.nom,cercle:item.cercle,element:item.element,effet:item.effet};
  if(gravés.filter(e=>e.tab===grimTab||grimTab==='sorts').length<max||max===0){
    // Si sorts, compter uniquement les sorts gravés
    const sortsGraves=gravés.filter(e=>e.tab==='sorts').length;
    if(grimTab==='sorts'&&sortsGraves<max){
      S.effets_magiques.gravés.push(payload);
    } else if(grimTab!=='sorts'){
      S.effets_magiques.gravés.push(payload);
    } else {
      S.effets_magiques.focus.push({...payload,mode:'focus'});
      toast('Compteur plein — ajouté en Focus uniquement');
    }
  } else if(grimTab==='sorts'){
    S.effets_magiques.focus.push({...payload,mode:'focus'});
    toast('Compteur plein — ajouté en Focus uniquement');
  } else {
    S.effets_magiques.gravés.push(payload);
  }
  doLocalSave();
}
function grimRemoveEffet(item){
  if(!S.effets_magiques) return;
  S.effets_magiques.gravés=(S.effets_magiques.gravés||[]).filter(e=>!(e.id===item.id&&e.tab===grimTab));
  S.effets_magiques.focus=(S.effets_magiques.focus||[]).filter(e=>!(e.id===item.id&&e.tab===grimTab));
  doLocalSave();
}

// ── DOM helpers ───────────────────────────────────────
function grimEl(tag,cls,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html!==undefined)e.innerHTML=html;
  return e;
}
function elemColor(el){
  const m={'Air':'#7eb8d4','Feu':'#e05c2a','Terre':'#6b8e4e','Eau':'#3a6b8a','Lune':'#9b8fc0'};
  for(const k of Object.keys(m)) if(el&&el.includes(k)) return m[k];
  return '#888';
}

// ── Affichage principal ───────────────────────────────
async function showGrimoire(){
  const old=document.querySelector('.grim-overlay');if(old)old.remove();
  const overlay=grimEl('div','grim-overlay');
  overlay.onclick=(e)=>{if(e.target===overlay){overlay.remove();render();}};
  const panel=grimEl('div','grim-panel');

  const head=grimEl('div','grim-head');
  const title=grimEl('span','grim-title','✡ Grimoire des Âmes');

  const tabs=grimEl('div','grim-tabs');
  const tabDefs=[['sorts','Magie'],['invocations','Kabbale'],['formules','Alchimie']];
  tabDefs.forEach(([t,label])=>{
    const btn=grimEl('button','grim-tab'+(t===grimTab?' on':''),label);
    btn.onclick=async()=>{
      grimTab=t;grimSearch='';grimFilters={cercle:'',element:''};grimOpenId=null;
      document.querySelectorAll('.grim-tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      await renderGrimBody(bodyDiv,searchInp);
    };
    tabs.appendChild(btn);
  });

  const searchInp=grimEl('input','grim-search');
  searchInp.type='text';searchInp.placeholder='Rechercher…';searchInp.value=grimSearch;
  searchInp.oninput=async(e)=>{grimSearch=e.target.value;grimOpenId=null;await renderGrimBody(bodyDiv,searchInp);};

  const closeBtn=grimEl('button','grim-close','✕ Fermer');
  closeBtn.onclick=()=>{overlay.remove();render();};

  head.appendChild(title);head.appendChild(tabs);head.appendChild(searchInp);head.appendChild(closeBtn);

  const bodyDiv=grimEl('div','grim-body');
  bodyDiv.innerHTML='<div class="grim-loading">Invocation des arcanes…</div>';

  panel.appendChild(head);
  panel.appendChild(bodyDiv);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  await renderGrimBody(bodyDiv,searchInp);
}

async function renderGrimBody(bodyDiv,searchInp){
  bodyDiv.innerHTML='<div class="grim-loading">Invocation des arcanes…</div>';
  const raw=await loadGrimTab(grimTab);
  const dom=grimGetKaDom();
  const max=grimMaxGraves();
  const effets=grimGetEffets();
  const sortsGraves=(effets.gravés||[]).filter(e=>e.tab==='sorts').length;
  const sortsFocus=(effets.focus||[]).filter(e=>e.tab==='sorts').length;

  // Cercles et éléments disponibles
  const cercles=[...new Set(raw.map(r=>r.cercle).filter(Boolean))].sort();
  const elements=[...new Set(raw.map(r=>(r.element||'').split(',').map(x=>x.trim())).flat().filter(e=>e&&e!=='nan'&&!['Au choix','Variable','Choix','Celui du Kabbaliste','Un élément',''].includes(e)))].sort();

  // Filtrage
  let items=raw.filter(r=>{
    const q=grimSearch.toLowerCase();
    const matchSearch=!q||r.nom?.toLowerCase().includes(q)||r.effet?.toLowerCase().includes(q)||r.element?.toLowerCase().includes(q);
    const matchCercle=!grimFilters.cercle||r.cercle===grimFilters.cercle;
    const matchElem=!grimFilters.element||(r.element&&r.element.includes(grimFilters.element));
    return matchSearch&&matchCercle&&matchElem;
  });

  // Trier : accessibles d'abord, puis grisés, puis bloqués
  items.sort((a,b)=>{
    const ra=grimItemAccess(a,grimTab);
    const rb=grimItemAccess(b,grimTab);
    const score=x=>x.ok===true?0:x.ok==='grise'?1:2;
    return score(ra)-score(rb)||a.nom.localeCompare(b.nom);
  });

  bodyDiv.innerHTML='';

  // ── Compteur sorts gravés ──
  if(grimTab==='sorts'&&dom){
    const ctr=grimEl('div','grim-compteur');
    ctr.innerHTML=`<span class="grim-ctr-lbl">Sorts gravés</span><span class="grim-ctr-val">${sortsGraves} / ${max}</span>${sortsFocus>0?`<span class="grim-ctr-focus">${sortsFocus} en Focus</span>`:''}`;
    bodyDiv.appendChild(ctr);
  }

  // ── Filtres ──
  const filtersDiv=grimEl('div','grim-filters');
  cercles.forEach(c=>{
    const label=c.replace('1-','').replace('2-','');
    const p=grimEl('button','grim-pill'+(grimFilters.cercle===c?' on':''),label);
    p.onclick=async()=>{grimFilters.cercle=grimFilters.cercle===c?'':c;grimOpenId=null;await renderGrimBody(bodyDiv,searchInp);};
    filtersDiv.appendChild(p);
  });
  elements.forEach(el=>{
    const p=grimEl('button','grim-pill'+(grimFilters.element===el?' on':''),el);
    p.style.borderColor=elemColor(el)+'88';
    if(grimFilters.element===el) p.style.background=elemColor(el)+'22';
    p.onclick=async()=>{grimFilters.element=grimFilters.element===el?'':el;grimOpenId=null;await renderGrimBody(bodyDiv,searchInp);};
    filtersDiv.appendChild(p);
  });
  bodyDiv.appendChild(filtersDiv);

  const access=items.filter(i=>grimItemAccess(i,grimTab).ok===true);
  const count=grimEl('div','grim-count',`${access.length} accessible${access.length>1?'s':''} · ${items.length} total`);
  bodyDiv.appendChild(count);

  if(items.length===0){
    bodyDiv.appendChild(grimEl('div','grim-empty','Aucun effet trouvé.'));
    return;
  }

  items.filter(item=>item&&item.nom).forEach(item=>{
    const access=grimItemAccess(item,grimTab);
    const isGrave=grimIsGrave(item);
    const isFocus=grimIsFocus(item);
    const isSelected=isGrave||isFocus;

    let cardCls='grim-card';
    if(access.ok===false) cardCls+=' grim-blocked';
    else if(access.ok==='grise') cardCls+=' grim-grise';
    if(isSelected) cardCls+=' grim-selected';
    if(item.id===grimOpenId) cardCls+=' open';

    const card=grimEl('div',cardCls);
    card.onclick=(e)=>{
      if(e.target.classList.contains('grim-add-btn')||e.target.classList.contains('grim-rem-btn')) return;
      grimOpenId=grimOpenId===item.id?null:item.id;
      document.querySelectorAll('.grim-card').forEach(c=>{c.classList.remove('open');c.querySelector('.grim-detail')&&(c.querySelector('.grim-detail').style.display='none');});
      if(grimOpenId===item.id){card.classList.add('open');const det=card.querySelector('.grim-detail');if(det)det.style.display='block';}
    };

    // Head
    const cardHead=grimEl('div','grim-card-head');
    const nom=grimEl('span','grim-card-nom',item.nom);
    if(isGrave) nom.innerHTML+=' <span class="grim-tag-grave">gravé</span>';
    if(isFocus) nom.innerHTML+=' <span class="grim-tag-focus">focus</span>';

    const badges=grimEl('div','grim-card-badges');
    if(item.cercle){const b=grimEl('span','grim-badge cercle',item.cercle.replace('1-','').replace('2-',''));badges.appendChild(b);}
    if(item.element){
      const b=grimEl('span','grim-badge elem',item.element);
      b.style.borderColor=elemColor(item.element)+'66';
      badges.appendChild(b);
    }
    if(item.seuil&&item.seuil!==''){const b=grimEl('span','grim-badge seuil','Seuil '+item.seuil);badges.appendChild(b);}
    if(access.ok!==true){const b=grimEl('span','grim-badge blocked',access.reason);badges.appendChild(b);}

    // Bouton ajout/retrait
    if(access.ok===true||access.ok==='grise'){
      const addBtn=isSelected
        ? grimEl('button','grim-rem-btn','− Retirer')
        : grimEl('button','grim-add-btn','+ Ajouter');
      addBtn.onclick=(e)=>{
        e.stopPropagation();
        if(isSelected){grimRemoveEffet(item);}
        else{grimAddEffet(item);}
        renderGrimBody(bodyDiv,searchInp);
      };
      badges.appendChild(addBtn);
    }

    cardHead.appendChild(nom);cardHead.appendChild(badges);
    card.appendChild(cardHead);

    // Détail
    const detail=grimEl('div','grim-detail');
    detail.style.display=item.id===grimOpenId?'block':'none';
    if(item.effet) detail.appendChild(grimEl('p','',item.effet));
    if(item.voie) detail.appendChild(grimEl('p','',`<strong>Voie :</strong> ${item.voie}`));
    if(item.sephirah) detail.appendChild(grimEl('p','',`<strong>Séphirah :</strong> ${item.sephirah}${item.monde?' · Monde : '+item.monde:''}`));
    if(item.contrat) detail.appendChild(grimEl('p','',`<strong>Contrat :</strong> ${item.contrat}`));
    if(item.substance) detail.appendChild(grimEl('p','',`<strong>Substance :</strong> ${item.substance}`));
    if(item.focus) detail.appendChild(grimEl('p','',`<strong>Focus :</strong> ${item.focus}`));
    if(item['references']) detail.appendChild(grimEl('div','grim-ref',item['references']));
    card.appendChild(detail);
    bodyDiv.appendChild(card);
  });
}
// ════════════════════════════════════════════════════════

doLocalLoad();
// Initialise Supabase si configuré
if(SUPA_URL && SUPA_KEY){
  if(initSupabase()){
    supaClient.auth.onAuthStateChange((_event, session) => {
      const wasConnected = !!supaCurrentUser;
      supaCurrentUser = session?.user || null;
      // Re-render uniquement si le statut de connexion change
      if(wasConnected !== !!supaCurrentUser) render();
      else { const bar=document.querySelector('.sync-bar'); if(bar){ bar.replaceWith(buildSyncBar()); } buildActionBar(); }
    });
    supaGetSession().then(()=>render());
  } else {
    render();
  }
} else {
  render();
}



</script>

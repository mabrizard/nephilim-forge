// MODULE MAGIE
// ═══════════════════════════════════════════════════════
// VOIES_MAGIE, MONDES, VOIES_ALCH définis globalement en haut du fichier
const MAGIE_LEVELS=[
  {id:'bas',  nm:'Basse Magie',   ico:'🌑',req:null,  color:'oeuvre noir',
   dc:'Fondements de la magie élémentaire. Sorts simples et rituels de base.'},
  {id:'haut', nm:'Haute Magie',   ico:'🌓',req:'bas',  color:'oeuvre blanc',
   dc:'Maîtrise des éléments. Choix d\'une Voie obligatoire. Sorts puissants.'},
  {id:'grand',nm:'Grand Secret',  ico:'🌕',req:'haut', color:'oeuvre rouge',
   dc:'Arcanes ultimes. Accès aux mystères des Nephilim.'},
];


// Synchronise les pools gratuits depuis les incarnations (étape 4)
// Appelée à chaque render pour maintenir les jauges à jour
function syncPools(){
  // Utilise calcPoolGratuits pour n'avoir QUE les degrés gratuits des époques
  const pg=calcPoolGratuits();
  S.pool_magie=pg.magie;
  S.pool_kabbale=pg.kabbale;
  S.pool_alchimie=pg.alchimie;
  // Sécurité : les degrés utilisés ne peuvent dépasser le pool disponible
  S.pool_magie_used=Math.min(S.pool_magie_used||0, S.pool_magie);
  S.pool_kabbale_used=Math.min(S.pool_kabbale_used||0, S.pool_kabbale);
  S.pool_alchimie_used=Math.min(S.pool_alchimie_used||0, S.pool_alchimie);
}
// Helpers pour les jauges
function poolMagieFree(){ return (S.pool_magie||0)-(S.pool_magie_used||0); }
function poolKabFree(){ return (S.pool_kabbale||0)-(S.pool_kabbale_used||0); }
function poolAlchFree(){ return (S.pool_alchimie||0)-(S.pool_alchimie_used||0); }
function buildMagie(){
  const sc=kaScores();
  const domVal=sc[S.ka_dom]||5;
  const wrap=h('div',{});

  // ── JAUGE POOL GRATUIT ────────────────────────────────
  const poolTotal=S.pool_magie||0;
  const poolUsed=S.pool_magie_used||0;
  const poolFree=poolTotal-poolUsed;
  const piLeft2=piLeft();

  if(poolTotal>0||piLeft2>0){
    const gaugeBox=h('div',{style:{
      background:'rgba(192,160,255,.07)',border:'1px solid rgba(192,160,255,.3)',
      borderRadius:'10px',padding:'1rem',marginBottom:'1.2rem',
    }});
    gaugeBox.appendChild(h('div',{style:{fontFamily:'Cinzel,serif',fontSize:'.85rem',
      color:'var(--seph)',marginBottom:'.6rem',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('span',{},'🔮 Degrés de Magie disponibles'),
      h('span',{style:{fontSize:'.75rem',color:'var(--gold-d)'}},`PI restants : ${piLeft2}`),
    ));

    // Barre de progression pool gratuit
    if(poolTotal>0){
      const pct=Math.round((poolUsed/poolTotal)*100);
      gaugeBox.appendChild(h('div',{style:{marginBottom:'.5rem'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.75rem',marginBottom:'.2rem'}},
          h('span',{style:{color:'var(--seph)'}},`Pool incarnations : ${poolFree} / ${poolTotal}° restants`),
          h('span',{style:{color:'var(--gold-d)'}},`${pct}% utilisé`),
        ),
        h('div',{style:{height:'6px',background:'rgba(192,160,255,.15)',borderRadius:'3px',overflow:'hidden'}},
          h('div',{style:{height:'100%',width:`${pct}%`,
            background:'linear-gradient(90deg,var(--seph),rgba(192,160,255,.6))',borderRadius:'3px',
            transition:'width .3s'}}),
        ),
        poolFree>0
          ? h('p',{style:{fontSize:'.72rem',color:'rgba(192,160,255,.7)',marginTop:'.2rem',fontStyle:'italic'}},
              `💡 Utilisez ces ${poolFree}° gratuits en cliquant ✚ — ils ne coûtent pas de PI`)
          : h('p',{style:{fontSize:'.72rem',color:'var(--gold-d)',marginTop:'.2rem',fontStyle:'italic'}},
              `Pool épuisé. Les degrés suivants coûtent 1 PI chacun.`),
      ));
    }
    wrap.appendChild(gaugeBox);
  }

  // ── NIVEAUX DE MAGIE ─────────────────────────────────
  for(const lv of MAGIE_LEVELS){
    const cur=S.magie[lv.id]||0;
    const reqOk=!lv.req||(S.magie[lv.req]||0)>=7;
    const canAddPool=poolFree>0;
    const canAddPI=piLeft2>=1;
    const canAdd=canAddPool||canAddPI;

    const box=h('div',{cls:`magie-level ${!reqOk?'locked':cur>0?'active':''}`});
    const hd=h('div',{cls:'magie-level-hd'});
    hd.appendChild(h('span',{cls:'magie-level-nm'},`${lv.ico} ${lv.nm}`));
    const ctrl=h('div',{cls:'deg-ctrl'});

    if(!reqOk){
      hd.appendChild(h('span',{cls:'magie-level-lock'},`🔒 Requiert ${lv.req==='bas'?'Basse':'Haute'} Magie ≥ 7`));
    } else {
      // Indicateur source du degré (pool vs PI)
      const srcLabel=h('span',{style:{fontSize:'.7rem',color:'var(--gold-d)',marginRight:'.3rem'}},
        canAddPool?'(pool)':'(1 PI)');

      ctrl.appendChild(h('button',{cls:'qb',disabled:cur<=0,
        onClick:()=>{
          // En retirant, on libère en priorité du pool
          if(lv.id==='haut'&&S.magie.haut===0) S.magie.voie=null;
          S.magie[lv.id]=Math.max(0,cur-1);
          // Libérer 1 degré de pool si applicable
          if(S.pool_magie_used>0) S.pool_magie_used=Math.max(0,S.pool_magie_used-1);
          render();
        }},'−'));
      ctrl.appendChild(h('span',{cls:'qdp'},String(cur)));
      ctrl.appendChild(srcLabel);
      ctrl.appendChild(h('button',{cls:'qb',disabled:!canAdd,
        onClick:()=>{
          S.magie[lv.id]=(cur||0)+1;
          // Consommer pool en priorité, sinon PI
          if(canAddPool){ S.pool_magie_used=(S.pool_magie_used||0)+1; }
          render();
        }},'✚'));
      ctrl.appendChild(h('span',{style:{color:'var(--gold-d)',fontSize:'.75rem',marginLeft:'.3rem'}},
        `${cur}°${canAddPool?' 🎁':' 💎'}`));
    }
    hd.appendChild(ctrl);
    box.appendChild(hd);
    box.appendChild(h('p',{cls:'lbl',style:{margin:'.3rem 0 .5rem'}},lv.dc));

    // Voie obligatoire si Haute Magie > 0
    if(lv.id==='haut'&&cur>0){
      const vbox=h('div',{style:{marginTop:'.6rem'}});
      vbox.appendChild(h('p',{cls:'lbl'},'Voie choisie (obligatoire) :'));
      const vsel=document.createElement('select');
      const opt0=document.createElement('option');opt0.value='';opt0.textContent='— Choisir une Voie —';
      vsel.appendChild(opt0);
      for(const v of VOIES_MAGIE){
        const o=document.createElement('option');o.value=v.nm;o.textContent=v.nm;
        if(S.magie.voie===v.nm)o.selected=true;
        vsel.appendChild(o);
      }
      vsel.addEventListener('change',e=>{S.magie.voie=e.target.value||null;render();});
      vbox.appendChild(vsel);
      if(S.magie.voie){
        const vDc=VOIES_MAGIE.find(v=>v.nm===S.magie.voie);
        if(vDc) vbox.appendChild(h('p',{cls:'lbl',style:{color:'var(--gold-d)',marginTop:'.3rem',fontStyle:'italic'}},vDc.dc));
      }
      box.appendChild(vbox);
    }

    // Sorts (Basse Magie uniquement)
    if(lv.id==='bas'&&cur>0){
      const sbox=h('div',{style:{marginTop:'.6rem'}});
      const cptRow=h('div',{style:{display:'flex',alignItems:'center',gap:'.8rem',flexWrap:'wrap',marginBottom:'.6rem'}});
      cptRow.appendChild(h('span',{cls:'lbl',style:{margin:0}},`Sorts mémorisés (max Ka dominant = ${domVal}) :`));
      cptRow.appendChild(h('button',{cls:'qb',disabled:(S.magie.sorts||0)<=0,
        onClick:()=>{S.magie.sorts=Math.max(0,(S.magie.sorts||0)-1);render();}},'−'));
      cptRow.appendChild(h('span',{cls:'qdp'},String(S.magie.sorts||0)));
      cptRow.appendChild(h('button',{cls:'qb',disabled:(S.magie.sorts||0)>=domVal,
        onClick:()=>{S.magie.sorts=Math.min(domVal,(S.magie.sorts||0)+1);render();}},'✚'));
      cptRow.appendChild(h('span',{style:{fontSize:'.75rem',color:'var(--gold-d)'}},`/ ${domVal} · au-delà = "sur focus"`));
      sbox.appendChild(cptRow);
      const cerclesOk=['Basse Magie'];
      if((S.magie.haut||0)>0) cerclesOk.push('Haute Magie');
      const sortsDispos=SORTS.filter(s=>cerclesOk.includes(s.cercle)&&(s.ka==='Variable'||s.ka==='Choix'||s.ka===S.ka_dom));
      if(sortsDispos.length>0){
        sbox.appendChild(h('p',{cls:'lbl',style:{marginBottom:'.4rem'}},'📖 Grimoire accessible :'));
        const sortGrid=h('div',{cls:'il'});
        for(const sort of sortsDispos){
          const isSel=(S.magie.sorts_choisis||[]).includes(sort.id);
          const row=h('div',{cls:`ir ${isSel?'sel':''}`,style:{cursor:'pointer'},
            onClick:()=>{
              if(!S.magie.sorts_choisis)S.magie.sorts_choisis=[];
              if(isSel){S.magie.sorts_choisis=S.magie.sorts_choisis.filter(x=>x!==sort.id);}
              else if(S.magie.sorts_choisis.length<(S.magie.sorts||0)){S.magie.sorts_choisis.push(sort.id);}
              render();
            }});
          row.appendChild(h('div',{cls:'ir-nm'},
            h('strong',{},sort.nm),
            h('small',{},` [${sort.cercle}·Ka ${sort.ka}·Deg.${sort.deg}] ${sort.dc}`),
            h('br',{}),
            h('small',{style:{color:'var(--gold-d)'}},`Portée:${sort.portee} · Durée:${sort.duree}`),
          ));
          row.appendChild(h('span',{style:{color:isSel?'var(--gold)':'var(--gold-d)',fontSize:'.8rem'}},isSel?'✓':'◦'));
          sortGrid.appendChild(row);
        }
        sbox.appendChild(sortGrid);
      }
      box.appendChild(sbox);
    }
    wrap.appendChild(box);
  }
  return wrap;
}

function buildKabbale(){
  const totalSeph=Object.values(S.sephiroth).reduce((a,b)=>a+b,0);
  const piKab=Math.ceil(totalSeph/3);
  const left=piLeft();
  const poolTotal=S.pool_kabbale||0;
  const poolUsed=S.pool_kabbale_used||0;
  const poolFree=poolTotal-poolUsed;
  // En Kabbale, 1 degré pool = 1 degré Sephirah gratuit
  // 1 PI acheté = 3 degrés supplémentaires

  const wrap=h('div',{});

  // ── JAUGE POOL KABBALE ────────────────────────────────
  if(poolTotal>0||left>0){
    const gaugeBox=h('div',{style:{
      background:'rgba(192,160,255,.07)',border:'1px solid rgba(192,160,255,.35)',
      borderRadius:'10px',padding:'1rem',marginBottom:'1.2rem',
    }});
    gaugeBox.appendChild(h('div',{style:{fontFamily:'Cinzel,serif',fontSize:'.85rem',
      color:'var(--seph)',marginBottom:'.6rem',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('span',{},'🌳 Degrés de Kabbale disponibles'),
      h('span',{style:{fontSize:'.75rem',color:'var(--gold-d)'}},`PI restants : ${left} (→ +${left*3}°)`),
    ));

    // Pool incarnations
    if(poolTotal>0){
      const pct=Math.round((poolUsed/poolTotal)*100);
      gaugeBox.appendChild(h('div',{style:{marginBottom:'.6rem'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.75rem',marginBottom:'.2rem'}},
          h('span',{style:{color:'var(--seph)'}},`Pool incarnations : ${poolFree} / ${poolTotal}° restants (gratuits)`),
          h('span',{style:{color:'var(--gold-d)'}},`${pct}% utilisé`),
        ),
        h('div',{style:{height:'6px',background:'rgba(192,160,255,.15)',borderRadius:'3px',overflow:'hidden'}},
          h('div',{style:{height:'100%',width:`${pct}%`,
            background:'linear-gradient(90deg,var(--seph),rgba(192,160,255,.5))',borderRadius:'3px',
            transition:'width .3s'}}),
        ),
        poolFree>0
          ? h('p',{style:{fontSize:'.72rem',color:'rgba(192,160,255,.7)',marginTop:'.2rem',fontStyle:'italic'}},
              `💡 ${poolFree}° gratuits disponibles — consommés en priorité avant les PI`)
          : h('p',{style:{fontSize:'.72rem',color:'var(--gold-d)',marginTop:'.2rem'}},
              `Pool épuisé. Achat : 1 PI = 3 degrés supplémentaires.`),
      ));
    }

    // Pool PI acheté
    const piPool=piKab*3-totalSeph; // degrés PI encore libres
    gaugeBox.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'.8rem',flexWrap:'wrap'}},
      h('span',{style:{fontSize:'.8rem',color:'var(--gold-d)',fontFamily:'Cinzel,serif'}},'Achat PI :'),
      h('span',{style:{fontSize:'.78rem',color:'var(--gold-d)',fontStyle:'italic'}},
        'Placez les degrés directement dans les Sephiroth (💎 = 1 PI/3°)'),
      h('span',{style:{fontSize:'.75rem',color:'var(--parch-d)'}},
        `${totalSeph} degrés placés dans l\'Arbre · ${Math.ceil(totalSeph/3)} PI dépensés`),
    ));
    wrap.appendChild(gaugeBox);
  }

  // Info règle
  wrap.appendChild(h('div',{cls:'info-box'},
    h('strong',{},'Règle :'),' 1 PI = 3 degrés à répartir. Pool gratuit = consommé en priorité. Sephiroth : précédente ≥ 7 pour ouvrir la suivante.'
  ));

  // Pool info bar
  const poolMax2=piKab*3;
  const poolFree2=poolMax2-totalSeph;
  wrap.appendChild(h('div',{style:{textAlign:'center',padding:'.6rem',background:'rgba(192,160,255,.07)',
    border:'1px solid rgba(192,160,255,.2)',borderRadius:'8px',marginBottom:'1rem',
    fontFamily:'Cinzel,serif',fontSize:'.8rem',color:'var(--seph)'}},
    `Degrés libres à placer : ${poolFree2 + poolFree} (${poolFree} pool + ${poolFree2} PI)`
  ));

  // Arbre des Sephiroth
  const tree=h('div',{cls:'seph-tree'});
  for(let r=0;r<=5;r++){
    for(let c=0;c<3;c++){
      const sp=SEPH.find(s=>s.row===r&&s.col===c);
      if(!sp){tree.appendChild(h('div',{}));continue;}
      const unlk=sephOk(sp);
      const cur=S.sephiroth[sp.id]||0;
      const canAddSeph=poolFree>0||poolFree2>0||left>0;

      const node=h('div',{cls:`seph-node ${!unlk?'locked':cur>0?'act':'open'}`});
      node.appendChild(h('div',{cls:'seph-nm'},sp.nm));
      node.appendChild(h('div',{cls:'seph-val'},String(cur)));
      node.appendChild(h('div',{cls:'seph-cost'},sp.dc));

      if(unlk){
        const srcLabel=poolFree>0?'🎁':'💎';
        node.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'.4rem',marginTop:'.4rem',flexWrap:'wrap'}},
          h('button',{cls:'qb',disabled:cur<=0,
            onClick:()=>{
              S.sephiroth[sp.id]=Math.max(0,cur-1);
              // Libérer en priorité du pool
              if(S.pool_kabbale_used>0) S.pool_kabbale_used=Math.max(0,(S.pool_kabbale_used||0)-1);
              render();
            }},'−'),
          h('span',{style:{fontFamily:'Cinzel,serif',color:'var(--seph)',minWidth:'20px',textAlign:'center'}},
            String(cur)),
          h('span',{style:{fontSize:'.7rem',color:'var(--gold-d)'}},srcLabel),
          h('button',{cls:'qb',disabled:!canAddSeph||cur>=10,
            onClick:()=>{
              S.sephiroth[sp.id]=(cur||0)+1;
              if(poolFree>0){ S.pool_kabbale_used=(S.pool_kabbale_used||0)+1; }
              render();
            }},'✚'),
        ));
      } else {
        node.appendChild(h('div',{cls:'seph-cost',style:{color:'var(--blood-l)',marginTop:'.3rem'}},
          sp.req?`🔒 ${sp.req} ≥ 7`:''));
      }
      tree.appendChild(node);
    }
  }
  wrap.appendChild(tree);

  // Invocations accessibles
  const totalSeph2=Object.values(S.sephiroth).reduce((a,b)=>a+b,0);
  if(totalSeph2>0){
    const invbox=h('div',{cls:'box',style:{marginTop:'1rem'}});
    invbox.appendChild(h('h3',{},'✡️ Invocations accessibles'));
    const invgrid=h('div',{cls:'il'});
    const invDispos=INVOCATIONS.filter(inv=>{
      const sephScore=S.sephiroth[inv.sephira.toLowerCase()]||0;
      return sephScore>0&&(inv.ka==='Choix'||inv.ka==='Variable'||inv.ka===S.ka_dom);
    });
    if(invDispos.length===0){
      invgrid.appendChild(h('p',{cls:'lbl'},'Placez des degrés dans les Sephiroth pour accéder aux invocations.'));
    } else {
      for(const inv of invDispos){
        invgrid.appendChild(h('div',{cls:'ir'},
          h('div',{cls:'ir-nm'},
            h('strong',{},inv.nm),
            h('small',{},` [${inv.sephira} · Ka ${inv.ka} · Deg.${inv.deg}] ${inv.dc}`),
          ),
        ));
      }
    }
    invbox.appendChild(invgrid);
    wrap.appendChild(invbox);
  }

  // Choix Monde
  const needMonde=(S.sephiroth['hod']||0)>0||(S.sephiroth['netzah']||0)>0;
  if(needMonde){
    const mbox=h('div',{cls:'box',style:{marginTop:'1rem'}});
    mbox.appendChild(h('h3',{},'🌍 Choix du Monde (2e palier)'));
    const msel=document.createElement('select');
    const mopt0=document.createElement('option');mopt0.value='';mopt0.textContent='— Choisir un Monde —';
    msel.appendChild(mopt0);
    for(const m of MONDES){
      const o=document.createElement('option');o.value=m.nm;o.textContent=m.nm;
      if(S.monde===m.nm)o.selected=true;
      msel.appendChild(o);
    }
    msel.addEventListener('change',e=>{S.monde=e.target.value||null;render();});
    mbox.appendChild(msel);
    if(S.monde){
      const mDc=MONDES.find(m=>m.nm===S.monde);
      if(mDc) mbox.appendChild(h('p',{cls:'lbl',style:{color:'var(--seph)',marginTop:'.4rem',fontStyle:'italic'}},mDc.dc));
    }
    wrap.appendChild(mbox);
  }
  return wrap;
}

function buildAlchimie(){
  const sc=kaScores();
  const wrap=h('div',{});
  const totalAlch=(S.alchimie.noir||0)+(S.alchimie.blanc||0)+(S.alchimie.rouge||0);
  const poolTotal=S.pool_alchimie||0;
  const poolUsed=S.pool_alchimie_used||0;
  const poolFree=poolTotal-poolUsed;
  const left=piLeft();

  // ── JAUGE POOL ALCHIMIE ───────────────────────────────
  if(poolTotal>0||left>0){
    const gaugeBox=h('div',{style:{
      background:'rgba(224,92,42,.06)',border:'1px solid rgba(224,92,42,.3)',
      borderRadius:'10px',padding:'1rem',marginBottom:'1.2rem',
    }});
    gaugeBox.appendChild(h('div',{style:{fontFamily:'Cinzel,serif',fontSize:'.85rem',
      color:'#e8a080',marginBottom:'.6rem',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('span',{},'⚗️ Degrés d\'Alchimie disponibles'),
      h('span',{style:{fontSize:'.75rem',color:'var(--gold-d)'}},`PI restants : ${left}`),
    ));

    if(poolTotal>0){
      const pct=Math.round((poolUsed/poolTotal)*100);
      gaugeBox.appendChild(h('div',{style:{marginBottom:'.5rem'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.75rem',marginBottom:'.2rem'}},
          h('span',{style:{color:'#e8a080'}},`Pool incarnations : ${poolFree} / ${poolTotal}° restants`),
          h('span',{style:{color:'var(--gold-d)'}},`${pct}% utilisé`),
        ),
        h('div',{style:{height:'6px',background:'rgba(224,92,42,.12)',borderRadius:'3px',overflow:'hidden'}},
          h('div',{style:{height:'100%',width:`${pct}%`,
            background:'linear-gradient(90deg,rgba(224,92,42,.9),rgba(224,92,42,.4))',
            borderRadius:'3px',transition:'width .3s'}}),
        ),
        poolFree>0
          ? h('p',{style:{fontSize:'.72rem',color:'rgba(224,92,42,.8)',marginTop:'.2rem',fontStyle:'italic'}},
              `💡 ${poolFree}° gratuits disponibles — consommés en priorité (🎁), puis PI (💎)`)
          : h('p',{style:{fontSize:'.72rem',color:'var(--gold-d)',marginTop:'.2rem'}},
              `Pool épuisé. Les degrés suivants coûtent 1 PI chacun.`),
      ));
    }
    wrap.appendChild(gaugeBox);
  }

  // ── ŒUVRES ALCHIMIQUES ────────────────────────────────
  for(const ov of OEUVRES){
    const cur=S.alchimie[ov.id]||0;
    const reqOk=!ov.req||(S.alchimie[ov.req]||0)>=7;
    const canAddPool=poolFree>0;
    const canAddPI=left>=1;
    const canAdd=canAddPool||canAddPI;

    const box=h('div',{cls:`oeuvre ${ov.col} ${!reqOk?'locked':''}`});
    const hd=h('div',{cls:'oeuvre-hd'});
    hd.appendChild(h('span',{},`${ov.ico} ${ov.nm}`));

    if(!reqOk){
      hd.appendChild(h('span',{style:{color:'var(--blood-l)',fontSize:'.78rem'}},
        `🔒 Requiert ${ov.req==='noir'?'Œuvre au Noir':'Œuvre au Blanc'} ≥ 7`));
    } else {
      const srcLabel=h('span',{style:{fontSize:'.7rem',color:'var(--gold-d)',margin:'0 .2rem'}},
        canAddPool?'🎁':'💎');
      const ctrl=h('div',{cls:'deg-ctrl'});
      ctrl.appendChild(h('button',{cls:'qb',disabled:cur<=0,
        onClick:()=>{
          S.alchimie[ov.id]=Math.max(0,cur-1);
          if(ov.id==='blanc'&&S.alchimie.blanc===0) S.alchimie.voie=null;
          if(S.pool_alchimie_used>0) S.pool_alchimie_used=Math.max(0,(S.pool_alchimie_used||0)-1);
          render();
        }},'−'));
      ctrl.appendChild(h('span',{cls:'qdp'},String(cur)));
      ctrl.appendChild(srcLabel);
      ctrl.appendChild(h('button',{cls:'qb',disabled:!canAdd,
        onClick:()=>{
          S.alchimie[ov.id]=(cur||0)+1;
          if(canAddPool){ S.pool_alchimie_used=(S.pool_alchimie_used||0)+1; }
          render();
        }},'✚'));
      ctrl.appendChild(h('span',{style:{color:'var(--gold-d)',fontSize:'.75rem',marginLeft:'.3rem'}},
        `${cur}° · ${canAddPool?'gratuit':'1 PI'}`));
      hd.appendChild(ctrl);
    }
    box.appendChild(hd);
    box.appendChild(h('p',{cls:'lbl',style:{margin:'.3rem 0 .5rem'}},ov.dc));

    // Voie obligatoire Œuvre au Blanc
    if(ov.id==='blanc'&&cur>0){
      box.appendChild(h('p',{cls:'lbl'},'Voie alchimique (obligatoire) :'));
      const vsel=document.createElement('select');
      const vopt0=document.createElement('option');vopt0.value='';vopt0.textContent='— Choisir une Voie —';
      vsel.appendChild(vopt0);
      for(const v of VOIES_ALCH){
        const o=document.createElement('option');o.value=v.nm;o.textContent=`${v.nm} (Ka ${v.ka})`;
        if(S.alchimie.voie===v.nm)o.selected=true;
        vsel.appendChild(o);
      }
      vsel.addEventListener('change',e=>{S.alchimie.voie=e.target.value||null;render();});
      box.appendChild(vsel);
      if(S.alchimie.voie){
        const vDc=VOIES_ALCH.find(v=>v.nm===S.alchimie.voie);
        if(vDc) box.appendChild(h('p',{cls:'lbl',style:{color:'#e8a080',marginTop:'.3rem',fontStyle:'italic'}},vDc.dc));
      }
    }
    wrap.appendChild(box);
  }

  // ── CONSTRUCTS ────────────────────────────────────────
  if(totalAlch>0){
    const cbox=h('div',{cls:'box',style:{marginTop:'1rem'}});
    cbox.appendChild(h('h3',{},'🏭 Constructs — 1 PI chacun'));
    cbox.appendChild(h('p',{cls:'lbl'},'Équipements alchimiques permanents du laboratoire.'));
    const cgrid=h('div',{cls:'cstr-types'});
    const leftC=piLeft();
    for(const ct of CONSTRUCT_TYPES){
      const cnt=S.constructs[ct.id]||0;
      const card=h('div',{cls:`cstr-type ${cnt>0?'sel':''}`},
        h('span',{},ct.ico+' '),
        h('span',{cls:'cstr-type-nm'},ct.nm),
        h('span',{cls:'cstr-type-dc'},ct.dc),
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'.4rem',marginTop:'.4rem'}},
          h('button',{cls:'qb',disabled:cnt<=0,
            onClick:e=>{e.stopPropagation();S.constructs[ct.id]=Math.max(0,cnt-1);render();}},'−'),
          h('span',{cls:'cstr-count'},String(cnt)),
          h('button',{cls:'qb',disabled:leftC<1,
            onClick:e=>{e.stopPropagation();S.constructs[ct.id]=(cnt||0)+1;render();}},'✚'),
        ),
      );
      cgrid.appendChild(card);
    }
    cbox.appendChild(cgrid);
    const totalCstr=Object.values(S.constructs).reduce((a,b)=>a+b,0);
    cbox.appendChild(h('p',{cls:'lbl',style:{marginTop:'.7rem',textAlign:'center'}},
      `Total : ${totalCstr} constructs = ${totalCstr} PI`));
    wrap.appendChild(cbox);

    // Jauges MP
    const mpbox=h('div',{cls:'box'});
    mpbox.appendChild(h('h3',{},'🧪 Jauges de Materiae Primae'));
    mpbox.appendChild(h('p',{cls:'lbl'},'Degrés Alchimie totaux + Ka de l\'élément associé'));
    const mpgrid=h('div',{cls:'mp-grid'});
    const MP_TYPES=[
      {nm:'Soufre',  ka:'Feu',  ico:'🔥'},
      {nm:'Mercure', ka:'Air',  ico:'🌬️'},
      {nm:'Sel',     ka:'Terre',ico:'🌍'},
      {nm:'Eau-Forte',ka:'Eau', ico:'💧'},
      {nm:'Quintessence',ka:'Lune',ico:'☽'},
    ];
    for(const mp of MP_TYPES){
      const kaVal=sc[mp.ka]||0;
      const mpMax=totalAlch+kaVal;
      mpgrid.appendChild(h('div',{cls:'mp-box'},
        h('span',{cls:'mp-nm'},`${mp.ico} ${mp.nm}`),
        h('span',{cls:'mp-val'},String(mpMax)),
        h('span',{cls:'mp-fm'},`${totalAlch}+${kaVal}`),
      ));
    }
    mpbox.appendChild(mpgrid);
    wrap.appendChild(mpbox);

    // Formules accessibles
    const fbox=h('div',{cls:'box'});
    fbox.appendChild(h('h3',{},'📜 Formules accessibles'));
    const oeuvresOk=[];
    if((S.alchimie.noir||0)>0) oeuvresOk.push('Noir');
    if((S.alchimie.blanc||0)>0) oeuvresOk.push('Blanc');
    if((S.alchimie.rouge||0)>0) oeuvresOk.push('Rouge');
    const formDispos=FORMULES.filter(f=>oeuvresOk.includes(f.oeuvre));
    if(formDispos.length===0){
      fbox.appendChild(h('p',{cls:'lbl'},'Progressez dans les Œuvres pour débloquer des formules.'));
    } else {
      const fgrid=h('div',{cls:'il'});
      for(const fm of formDispos){
        const hasC=(S.constructs[fm.construct.toLowerCase()]||0)>0;
        fgrid.appendChild(h('div',{cls:`ir ${hasC?'sel':''}`,style:{opacity:hasC?'1':'0.55'}},
          h('div',{cls:'ir-nm'},
            h('strong',{},fm.nm),
            h('small',{},` [${fm.oeuvre}·Ka ${fm.ka}·Deg.${fm.deg}] ${fm.dc}`),
            h('br',{}),
            h('small',{style:{color:hasC?'var(--ok)':'var(--blood-l)'}},
              `Construct: ${fm.construct} ${hasC?'✓':'✕ manquant'}`),
          ),
        ));
      }
      fbox.appendChild(fgrid);
    }
    wrap.appendChild(fbox);
  }
  return wrap;
}

function s6(){
  const d=h('div',{cls:'step'});
  d.appendChild(h('div',{cls:'step-ttl','data-n':'VI'},'Stase & Chutes'));
  d.appendChild(h('p',{cls:'step-sub'},'L\'objet-stase abrite votre âme entre les incarnations. Les Chutes sont vos failles spirituelles — chaque degré vous rapporte +5 PI.'));

  const sb=h('div',{cls:'box'},h('h3',{},'🔮 Objet-Stase'));

  ta.addEventListener('input',e=>{S.stase=e.target.value;});
  sb.appendChild(ta);
  d.appendChild(sb);

  // ── CHUTES OFFICIELLES ───────────────────────────────
  const chuteMax=S.chutes_max||2;
  const chuteUsed=Object.values(S.chutes).reduce((a,b)=>a+(b||0),0);
  const bonusActuel=chutesBonusPI();

  const chb=h('div',{cls:'box'});
  chb.appendChild(h('h3',{},'🌑 Degrés de Chute'));

  // Résumé budget
  chb.appendChild(h('div',{style:{
    display:'flex',gap:'1rem',flexWrap:'wrap',alignItems:'center',
    padding:'.7rem',background:'rgba(139,26,26,.08)',border:'1px solid rgba(139,26,26,.25)',
    borderRadius:'8px',marginBottom:'1rem',fontFamily:'Cinzel,serif',fontSize:'.82rem',

  ));

  // Les 3 Chutes officielles
  const cg=h('div',{cls:'chute-grid'});
  for(const chute of CHUTES){
    const val=S.chutes[chute.id]||0;
    const bonusChute=val*5;

    const cb=h('div',{cls:'chute-box'});
    // En-tête
    const hd=h('div',{cls:'chute-hd'});
    hd.appendChild(h('span',{},`${chute.ico} ${chute.nm}`));
    const hdr=h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem'}});
    hdr.appendChild(h('span',{style:{color:'var(--blood-l)',fontFamily:'Cinzel,serif',fontSize:'1rem',fontWeight:'700'}},String(val)));
    if(bonusChute>0)hdr.appendChild(h('span',{style:{color:'var(--ok)',fontSize:'.72rem'}},`+${bonusChute} PI`));
    hd.appendChild(hdr);
    cb.appendChild(hd);

    // Description
    cb.appendChild(h('p',{style:{fontSize:'.75rem',color:'var(--parch-d)',fontStyle:'italic',margin:'.3rem 0 .6rem'}},chute.dc));

    // Slider avec contrôle du total max
    const sl=document.createElement('input');
    sl.type='range';sl.min='0';sl.max='3';sl.value=String(val);
    sl.addEventListener('input',e=>{
      const newVal=parseInt(e.target.value);
      const autresTotal=Object.entries(S.chutes)
        .filter(([k])=>k!==chute.id)
        .reduce((a,[,v2])=>a+(v2||0),0);
      if(autresTotal+newVal>chuteMax){sl.value=String(val);return;}
      S.chutes[chute.id]=newVal;
      render();
    });
    cb.appendChild(sl);

    // Indicateur degrés + bonus
    const indic=h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'.3rem',fontSize:'.72rem'}});
    indic.appendChild(h('span',{style:{color:'var(--parch-d)'}},`${val} degré(s)`));
    if(bonusChute>0)indic.appendChild(h('span',{style:{color:'var(--ok)'}},`+${bonusChute} PI`));
    cb.appendChild(indic);

    cg.appendChild(cb);
  }
  chb.appendChild(cg);

  // Info-box règle
  chb.appendChild(h('div',{cls:'info-box',style:{marginTop:'1rem'}},
    h('strong',{},'Règle des Chutes :'),' Chaque degré de Chute accepté rapporte ',
    h('strong',{},'+5 PI'),' immédiatement ajoutés à votre budget. Maximum ',
    h('strong',{},String(chuteMax)),' degré(s) selon votre profil ',
    h('strong',{},S.profil||'?'),'. Les Chutes représentent la corruption de votre âme — un pacte faustien avec vos propres failles.'
  ));

  d.appendChild(chb);
  d.appendChild(nav(true,true));
  return d;
}

      // Ensure new inc fields exist for compatibility

}

// toast(msg, type) — type: 'success' | 'error' | '' (default gold)
// Durée : 3 secondes, animation élastique
let _toastTimer=null;
function toast(msg, type=''){
  let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  // Reset classes
  t.className='toast'+(type?' '+type:'');
  // Icon prefix
  const icon=type==='success'?'✓ ':type==='error'?'✕ ':'';
  t.textContent=icon+msg;
  // Force reflow pour relancer l'animation si déjà visible
  void t.offsetWidth;
  t.classList.add('show');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{t.classList.remove('show');},3000);
}
function toastSuccess(msg){toast(msg,'success');}
function toastError(msg){toast(msg,'error');}
